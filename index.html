<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <main class="container-fluid text-center">
        <h1>Galería de Superhéroes</h1>
        <div class="row" id="rowCarta">

        </div>
        <div class="input-group flex-nowrap" id="buscarNombre">
            <span class="input-group-text" id="addon-wrapping"></span>
            <input type="text" class="form-control" id="inputUsuario" placeholder="Ingresar nombre de superheroe" aria-label="Username" aria-describedby="addon-wrapping">
            <button type="button" class="btn btn-primary" id="btnBuscar">Buscar</button>
        </div>
        <form action="" class="novalidate" id="formPersonaje">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nombrePersonaje" placeholder="name-example">
                <label for="nombrePersonaje">Nombre</label>
            </div>
            <div class="form-floating">
                <input type="url" class="form-control" id="urlPersonaje" placeholder="submit-url">
                <label for="urlPersonaje">URL</label>
            </div>
            <button type="button" class="btn btn-primary" id="btnSubirPj">Subir</button>
        </form>
    </main>






















    <script src="assets/js/app.js"></script>
</body>
</html>
